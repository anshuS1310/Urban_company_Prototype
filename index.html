<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urban Company - Clickable Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">
  <!-- Centered Viewport Container -->
  <main class="viewport-container">
    <div class="phone-frame">
      <div class="phone-notch"></div>
      
      <!-- Theme Toggle Switch positioned at the top-right corner of the mobile screen container -->
      <button class="phone-theme-toggle" id="phone-theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle Theme">
        <!-- Sun Icon (visible in dark theme) -->
        <svg class="sun-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <!-- Moon Icon (visible in light theme) -->
        <svg class="moon-icon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>

      <!-- Dynamic Phone Screen Viewport -->
      <div class="phone-screen" id="phone-screen-container">
        <!-- Screens render here dynamically -->
      </div>
      
      <!-- Phone Home Indicator Bar -->
      <div class="phone-home-indicator" onclick="resetPrototype()" title="Restart App"></div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
